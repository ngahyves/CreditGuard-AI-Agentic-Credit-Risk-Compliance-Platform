project:
  name: "IntelliLoan Credit Guard"
  version: "0.3.0"
  environment: "local"
  seed: 42

data_paths:
  raw: "data/raw/"
  interim: "data/interim/"
  processed: "data/processed/"
  features: "data/processed/features/"
  models: "models/"
  reports: "reports/"
  logs_dir: "logs/"

tables:
  application: "application_train.csv"
  bureau: "bureau.csv"
  bureau_balance: "bureau_balance.csv"
  previous_application: "previous_application.csv"
  pos_cash_balance: "POS_CASH_balance.csv"
  installments_payments: "installments_payments.csv"
  credit_card_balance: "credit_card_balance.csv"
  ingested_table: "master_ingested_v0.3.0.parquet" # table after aggregation
  modeling_matrix: "final_modeling_matrix.parquet" #Table after feature engineering
  ml_ready_data: "ml_ready_matrix.parquet" # table after preprocessing
  final_enriched_data: "final_enriched_modeling_matrix.parquet" #Table after adding unsupervised columns

schema:
  raw_schema: "config/raw_schema.json"
  processed_schema: "config/processed_schema.json"

aggregations:
  bureau:
    numeric: ['DAYS_CREDIT', 'AMT_CREDIT_SUM', 'AMT_ANNUITY']
    stats: ['mean', 'max', 'sum', 'std']
  previous_application:
    numeric: ['AMT_APPLICATION', 'AMT_DOWN_PAYMENT', 'DAYS_DECISION']
    stats: ['mean', 'min', 'max']

fusion:
  main_key: "SK_ID_CURR"
  previous_key: "SK_ID_PREV"
  bureau_key: "SK_ID_BUREAU"
  PREDICTIVE_POWER_THRESHOLD: 0.01
  CORR_THRESHOLD: 0.80

# --- MLflow & MLOps Configuration ---
mlops:
  mlflow_tracking_uri: "http://mlflow:5000"
  experiment_name: "IntelliLoan_Credit_Scoring"
  model_registry_name: "IntelliLoan_model_Champion"
  optuna:
    n_trials: 30
    timeout: 3600

models:
  supervised:
    lightgbm:
      type: "lightgbm"
      num_leaves: 64
      learning_rate: 0.05
    xgboost:
      type: "xgboost"
      max_depth: 6
      eta: 0.1
    catboost:
      type: "catboost"
      depth: 6
      learning_rate: 0.05

  unsupervised:
    kmeans:
      type: "kmeans"
      n_clusters: "auto"
      max_k_search: 10       # Maximum number of clusters to test for the elbow
      pca_variance: 0.80     # Percentage of variance to retain for PCA
    hdbscan:
      type: "hdbscan"
      min_cluster_size: 30
      umap_components: 5

training:
  test_size: 0.2
  n_splits: 5
  random_state: 42
  scoring_metric: "roc_auc"
  use_class_weight: true

features:
  enable_feature_selection: true
  enable_scaling: true
  enable_encoding: true
  drop_low_variance: true
  drop_high_correlation: true

thresholds:
  income_min: 0
  credit_score_min: 300
  credit_score_max: 850
  max_dti: 0.6
  max_ltv: 0.9

api:
  host: "0.0.0.0"
  port: 8000
  prefix: "/v1"
  enable_auth: true
  enable_rate_limit: true

rag:
  enabled: true
  provider: "openai"
  model: "gpt-4o-mini"
  max_context_docs: 10
  enable_self_critique: true

monitoring:
  enable_drift_detection: true
  enable_performance_tracking: true
  drift_check_interval_minutes: 60

logging:
  level: "INFO"

# A/B testing
ab_testing:
  # Values calculated on the test set
  tercile_boundaries:
    low_max: 0.05    # The top 33% have a probability < 0.05
    medium_max: 0.15 # The next 33% have a probability < 0.15
  
  strategies:
  #Approval Threshold (700): Any score above 700 is automatically accepted.
  #Rejection Threshold (400): Any score below 400 is rejected.
  #Gray Area (400–700): Anything in between goes to Manual Review.
    A:
      thresholds: {approve: 700, decline: 400}
    B:
      low_risk:    {approve: 650, decline: 350} # More lenient on vouchers
      medium_risk: {approve: 700, decline: 400} # Standard
      high_risk:   {approve: 750, decline: 450} # Tougher on Risky Behaviors

# --- Monitoring & Model Health ---
monitoring:
  enable_drift_detection: true
  enable_performance_tracking: true
  drift_check_interval_minutes: 60
  drift:
    threshold: 0.10         # Trigger if > 10% of features drift
    method: "ks"            # Kolmogorov-Smirnov test (default in Evidently)
    inject_simulated_drift: true # Toggle for testing the pipeline
    