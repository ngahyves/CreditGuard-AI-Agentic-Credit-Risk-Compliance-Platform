name: IntelliLoan CI/CD Pipeline

on:
  push:
    branches: [ main ] # Trigger main branch

env:
  GCP_PROJECT_ID: ${{ secrets.GCP_PROJECT_ID }}
  GCP_REGION: northamerica-northeast1
  ARTIFACT_REPO: intelliloan-repo
  IMAGE_NAME: intelliloan-api
  SERVICE_NAME: intelliloan-api

jobs:
  quality-assurance:
    name: Run Unit Tests & Data Validation
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3

      - name: Set up Python 3.11
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'

      - name: Install Dependencies
        run: |
          python -m pip install --upgrade pip
          pip install pytest 
          pip install -r requirements.txt

      - name: Execute Pytest
        # PLACE PLACEHOLDER VARIABLES
        # This prevents SQLAlchemy and LLMs from crashing during import
        env:
          DATABASE_URL: sqlite:///./test.db
          API_KEY_SECRET: "dummy_secret_for_tests"
          GROQ_API_KEY: "gsk_dummy_key"
          GEMINI_API_KEY: "dummy_gemini_key"
          LANGCHAIN_API_KEY: "dummy_ls_key"
          LOG_LEVEL: "INFO"
        run: python -m pytest tests/

  build-and-deploy:
    name: Build & Cloud Deploy
    needs: quality-assurance
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Source Code
        uses: actions/checkout@v3

      # 1. AUTHENTICATE TO GOOGLE CLOUD
      # The Service Account needs 'Storage Object Viewer' role to pull from DVC
      - id: 'auth'
        name: Authenticate to Google Cloud
        uses: 'google-github-actions/auth@v1'
        with:
          credentials_json: '${{ secrets.GCP_SA_KEY }}'

      # 2. SETUP DVC & PULL ARTIFACTS
      # We install DVC and pull the 200MB+ models directly from GCS
      - name: Install DVC and Pull Models
        env:
          GOOGLE_CLOUD_PROJECT: ${{ vars.GCP_PROJECT_ID }}
        run: |
          pip install dvc dvc-gs
          dvc pull  # This downloads the .joblib and .parquet files
          echo "Real artifacts successfully pulled from GCS."

      # 3. SETUP CLOUD SDK
      - name: Set up Cloud SDK
        uses: 'google-github-actions/setup-gcloud@v1'

      # 4. CONFIGURE DOCKER FOR ARTIFACT REGISTRY
      - name: Configure Docker
        run: gcloud auth configure-docker ${{ env.GCP_REGION }}-docker.pkg.dev

      # 5. BUILD AND PUSH CONTAINER
      # Now Docker will find the REAL files during the COPY commands
      - name: Build and Push Container
        run: |
          docker build -t ${{ env.GCP_REGION }}-docker.pkg.dev/${{ env.GCP_PROJECT_ID }}/${{ env.ARTIFACT_REPO }}/${{ env.IMAGE_NAME }}:${{ github.sha }} .
          docker push ${{ env.GCP_REGION }}-docker.pkg.dev/${{ env.GCP_PROJECT_ID }}/${{ env.ARTIFACT_REPO }}/${{ env.IMAGE_NAME }}:${{ github.sha }}

      # 6. AUTOMATED DEPLOYMENT TO CLOUD RUN
      - name: Deploy to Cloud Run
        run: |
          gcloud run deploy ${{ vars.SERVICE_NAME }} \
            --image ${{ env.GCP_REGION }}-docker.pkg.dev/${{ env.GCP_PROJECT_ID }}/${{ env.ARTIFACT_REPO }}/${{ env.IMAGE_NAME }}:${{ github.sha }} \
            --region ${{ env.GCP_REGION }} \
            --platform managed \
            --allow-unauthenticated \
            --memory 4Gi \
            --cpu 2 \
            --timeout 300 \
            --set-env-vars "API_KEY_SECRET=${{ secrets.API_KEY_SECRET }},\
            DATABASE_URL=${{ secrets.DATABASE_URL }},\
            GROQ_API_KEY=${{ secrets.GROQ_API_KEY }},\
            GEMINI_API_KEY=${{ secrets.GEMINI_API_KEY }},\
            LANGCHAIN_API_KEY=${{ secrets.LANGCHAIN_API_KEY }},\
            LANGCHAIN_TRACING_V2=${{ vars.LANGCHAIN_TRACING_V2 }},\
            LANGCHAIN_ENDPOINT=https://api.smith.langchain.com,\
            LANGCHAIN_PROJECT=${{ vars.LANGCHAIN_PROJECT }}"